<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇵🇭 PH Congress Dynasty Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9922A;--gold-light:#F0C96A;--gold-dim:#8B6520;
  --navy:#0A1628;--navy2:#112240;--navy3:#1A3357;
  --surface:#0F1F38;--surface2:#162848;--surface3:#1E3254;
  --text:#E8EDF5;--text2:#A8B8CC;--text3:#6A82A0;
  --red:#E05252;--green:#3CB07A;--blue:#4A9EE0;--purple:#9B72CF;
  --border:#1E3254;--radius:12px;
  --dynasty-bg:#2A1A08;--dynasty-border:#8B6520;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 50%,#0D1F3C 100%);
  border-bottom:1px solid var(--gold-dim);
  padding:0 32px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;height:64px;
}
.logo{display:flex;align-items:center;gap:12px}
.logo-flag{font-size:28px;line-height:1}
.logo-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold-light);letter-spacing:.5px}
.logo-sub{font-size:11px;color:var(--text3);font-weight:400;letter-spacing:.5px;text-transform:uppercase}
.nav{display:flex;gap:4px}
.nav-btn{padding:8px 16px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.nav-btn:hover,.nav-btn.active{background:var(--surface3);color:var(--gold-light)}

.main{padding:28px 32px;max-width:1600px;margin:0 auto}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default;}
.kpi-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-bar,var(--gold))}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:500;margin-bottom:8px}
.kpi-value{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:6px}
.kpi-icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:32px;opacity:.15}
.kpi-trend{font-size:11px;margin-top:4px;font-weight:600}
.kpi-trend.up{color:var(--red)}
.kpi-trend.neutral{color:var(--text3)}

/* SEARCH PANEL */
.search-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;}
.search-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold-light);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.search-grid{display:grid;grid-template-columns:2fr 1.5fr 1.5fr 1fr;gap:12px;align-items:end}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500}
.search-input,.search-select{background:var(--navy2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;width:100%;transition:border-color .2s;outline:none;}
.search-input:focus,.search-select:focus{border-color:var(--gold-dim)}
.search-input::placeholder{color:var(--text3)}
.search-select option{background:var(--navy2)}
.btn{padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.btn-primary{background:var(--gold);color:var(--navy);}
.btn-primary:hover{background:var(--gold-light)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}
.search-actions{display:flex;gap:8px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--text3)}
.tab.active{background:var(--surface3);color:var(--gold-light)}

/* RESULTS */
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.results-count{font-size:13px;color:var(--text3)}
.results-count span{color:var(--gold-light);font-weight:600}
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.person-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.person-card.dynasty{border-color:var(--dynasty-border);background:var(--dynasty-bg)}
.person-card.dynasty::after{content:'👑';position:absolute;top:14px;right:14px;font-size:16px;opacity:.7}
.pc-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;padding-right:28px}
.pc-name2{font-size:12px;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace}
.pc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;letter-spacing:.3px}
.tag-region{background:#1E2F48;color:#7BADD4}
.tag-clan{background:#2A1F00;color:var(--gold-light)}
.tag-female{background:#1F1528;color:#C97EE0}
.tag-male{background:#0F1E30;color:#7BADD4}
.tag-speaker{background:#1A2E00;color:#7BD47B}
.tag-dynasty{background:var(--dynasty-bg);color:var(--gold);border:1px solid var(--dynasty-border)}
.pc-stats{display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pc-stat{text-align:center}
.pc-stat-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text)}
.pc-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* DISTRICT TABLE */
.district-table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface2);color:var(--text2);font-weight:600;padding:12px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:2;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr:hover{background:var(--surface2)}
tbody tr.region-row{background:var(--surface3)}
tbody tr.region-row td{color:var(--gold-light);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px}
tbody td{padding:10px 14px;color:var(--text2);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tbody td:first-child{color:var(--text);font-weight:500}
.dynasty-cell{color:var(--gold)!important;font-weight:600!important}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:16px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--navy2);z-index:1;}
.modal-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal-name2{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace}
.modal-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.modal-close:hover{background:var(--surface3);color:var(--text)}
.modal-body{padding:24px 32px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px}
.info-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px}
.info-val{font-size:14px;color:var(--text);font-weight:500}
.info-val.dynasty{color:var(--gold)}
.section-head{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold-light);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);margin-top:4px;flex-shrink:0}
.tl-period{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold-light);min-width:140px;font-weight:500}
.tl-detail{font-size:13px;color:var(--text2)}
.tl-years{font-size:12px;color:var(--text3);margin-top:2px}

/* DYNASTY PANEL */
.dynasty-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.clan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.clan-card{background:var(--dynasty-bg);border:1px solid var(--dynasty-border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;}
.clan-card:hover{border-color:var(--gold-light);transform:translateY(-2px)}
.clan-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold-light);margin-bottom:6px}
.clan-members{font-size:12px;color:var(--text3)}
.clan-count{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--gold);float:right;margin-top:-8px}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:15px}

.pagination{display:flex;gap:8px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.page-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:13px;cursor:pointer;transition:all .2s;}
.page-btn:hover,.page-btn.active{background:var(--surface3);color:var(--gold-light);border-color:var(--gold-dim)}
.page-btn:disabled{opacity:.4;cursor:default}

.sheet-preview{background:var(--navy);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:10px}
.sheet-header{background:var(--surface2);padding:8px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.sheet-row{display:grid;font-size:12px;padding:6px 14px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.sheet-row.head{background:var(--surface3);color:var(--gold-light);font-weight:600}
.sheet-row.data{color:var(--text2)}
.sheet-row.data:last-child{border-bottom:none}
.col-pill{background:var(--navy3);padding:1px 6px;border-radius:3px;color:var(--text3);font-size:10px;margin-right:4px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-left:8px}
.badge-new{background:#1A3520;color:#5ECC7B;border:1px solid #2E6040}
.section-divider{height:1px;background:var(--border);margin:24px 0}
.fade-in{animation:fadeIn .3s ease-out forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}

@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.search-grid{grid-template-columns:1fr 1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.main{padding:16px}.header{padding:0 16px}.person-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-flag">🇵🇭</span>
    <div>
      <div class="logo-text">PH Congress Dynasty Tracker</div>
      <div class="logo-sub">8th – 20th Congress · 1907–Present</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('search')">🔍 Search</button>
    <button class="nav-btn" onclick="showView('districts')">🗺️ Districts</button>
    <button class="nav-btn" onclick="showView('dynasties')">👑 Dynasties</button>
    <button class="nav-btn" onclick="showView('congress')">📜 Congress</button>
    
  </nav>
</header>

<main class="main">
  <!-- KPI ROW -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- SEARCH VIEW -->
  <div id="view-search">
    <div class="search-panel">
      <div class="search-title">🔍 Search & Filter Legislators</div>
      <div class="search-grid">
        <div class="field-group">
          <label class="field-label">Search by Name (any format)</label>
          <input class="search-input" id="nameInput" placeholder="e.g. Marcos, Aquino, Bong, Aurora Abad…" oninput="debounceSearch()">
        </div>
        <div class="field-group">
          <label class="field-label">Filter by District</label>
          <input class="search-input" id="districtInput" placeholder="e.g. Lone, 1st District, Batanes…" oninput="debounceSearch()">
        </div>
        <div class="field-group">
          <label class="field-label">Filter by Congress / Timeline</label>
          <select class="search-select" id="congressSelect" onchange="doSearch()">
            <option value="">All Congresses</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Filter</label>
          <div class="search-actions">
            <select class="search-select" id="filterSelect" onchange="doSearch()" style="flex:1">
              <option value="">All</option>
              <option value="dynasty">Dynasty Only</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="multiterm">3+ Terms</option>
            </select>
            <button class="btn btn-ghost" onclick="clearSearch()">✕</button>
          </div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setCardView('cards',this)">⊞ Cards</button>
      <button class="tab" onclick="setCardView('table',this)">≡ Table</button>
    </div>
    <div class="results-header">
      <div class="results-count" id="resultsCount">Loading…</div>
    </div>
    <div id="cardsView"></div>
    <div id="tableView" style="display:none"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- DISTRICTS VIEW -->
  <div id="view-districts" style="display:none">
    <div class="search-panel">
      <div class="search-title">🗺️ District Representative History</div>
      <div class="search-grid" style="grid-template-columns:2fr 1.5fr 1fr">
        <div class="field-group">
          <label class="field-label">Search District or Province</label>
          <input class="search-input" id="dSearchInput" placeholder="e.g. Manila, Batanes, Cebu, 1st District…" oninput="renderDistricts()">
        </div>
        <div class="field-group">
          <label class="field-label">Filter by Region</label>
          <select class="search-select" id="dRegionSelect" onchange="renderDistricts()">
            <option value="">All Regions</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Congress</label>
          <select class="search-select" id="dCongressSelect" onchange="renderDistricts()">
            <option value="">All Congresses</option>
          </select>
        </div>
      </div>
    </div>
    <div class="district-table-wrap">
      <table id="districtTable">
        <thead id="districtThead"></thead>
        <tbody id="districtTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- DYNASTIES VIEW -->
  <div id="view-dynasties" style="display:none">
    <div class="search-panel">
      <div class="search-title">👑 Political Dynasty Families</div>
      <div class="search-grid" style="grid-template-columns:2fr 1fr auto">
        <div class="field-group">
          <label class="field-label">Search Clan / Family</label>
          <input class="search-input" id="clanSearchInput" placeholder="e.g. Marcos, Aquino, Romualdez…" oninput="renderDynasties()">
        </div>
        <div class="field-group">
          <label class="field-label">Min Members</label>
          <select class="search-select" id="clanMinSelect" onchange="renderDynasties()">
            <option value="2">2+</option>
            <option value="3">3+</option>
            <option value="5">5+</option>
            <option value="7">7+</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">&nbsp;</label>
          <button class="btn btn-ghost" onclick="document.getElementById('clanSearchInput').value='';renderDynasties()">✕ Clear</button>
        </div>
      </div>
    </div>
    <div id="dynastyContent"></div>
  </div>

  <!-- CONGRESS VIEW -->
  <div id="view-congress" style="display:none">
    <div class="search-panel">
      <div class="search-title">📜 Browse by Congress Period</div>
      <div class="search-grid" style="grid-template-columns:1.5fr 1fr 1fr">
        <div class="field-group">
          <label class="field-label">Select Congress</label>
          <select class="search-select" id="cCongressSelect" onchange="renderCongressView()">
            <option value="">Select a congress period…</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Filter by Region</label>
          <select class="search-select" id="cRegionSelect" onchange="renderCongressView()">
            <option value="">All Regions</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Sex</label>
          <select class="search-select" id="cSexSelect" onchange="renderCongressView()">
            <option value="">All</option>
            <option value="F">Female</option>
            <option value="M">Male</option>
          </select>
        </div>
      </div>
    </div>
    <div id="congressContent"></div>
  </div>

  </main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-name2" id="modalName2"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const LEGISLATORS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_mvfBjl6NTQq78FAywFTwD4kndApHnnHu4QEH-FQ2m8pROHKSfofRp9hul4XJoA/pub?gid=703765891&single=true&output=csv";
const DISTRICTS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXoUfNbQwjfqqLtXWlgBTwFKnx1CC7qD9bDk-dts1ogdawYr8LSFe7YF6T8H9-Yg/pub?gid=1021641418&single=true&output=csv";

const CORS_PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// ─── DISTRICT CANONICAL MAP ────────────────────────────────────────────────
// Old/variant district name → canonical modern name it should be merged into.
// null = splits into multiple successors (handled by DISTRICT_SPLITS below).
const DISTRICT_CANON = {
  // Typo fixes
  'Caloocan city, 3rd District':              'Caloocan City, 3rd District',
  'Bataan, 3rd Distirict':                    'Bataan, 3rd District',
  // Renames / one-to-one absorptions: old history flows into canonical
  'Taguig City-Pateros, Lone District':       'Taguig City, Lone District',
  'Makati City, Lone District':               'Makati City, 1st District',
  'Parañaque City, Lone District':            'Parañaque City, 1st District',
  'Marikina City, Lone District':             'Marikina City, 1st District',
  'Zamboanga City, Lone District':            'Zamboanga City, 1st District',
  'Cagayan de Oro City, Lone District':       'Cagayan de Oro City, 1st District',
  'Antipolo City, Lone District':             'Antipolo City, 1st District',
  'Valenzuela City, Lone District':           'Valenzuela City, 1st District',
  'Sultan Kudarat, Lone District':            'Sultan Kudarat, 1st District',
  'Zamboanga Sibugay, Lone District':         'Zamboanga Sibugay, 1st District',
  'Agusan del Sur, Lone District':            'Agusan del Sur, 1st District',
  'Camarines Norte, Lone District':           'Camarines Norte, 1st District',
  'Aklan, Lone District':                     'Aklan, 1st District',
  'Southern Leyte, Lone District':            'Southern Leyte, 1st District',
  'Benguet, Lone District':                   'Benguet, 1st District',
  'Davao del Sur, Lone District':             'Davao del Sur, 1st District',
  'Malabon-Navotas, Lone District':           'Malabon City, Lone District',
  'Zamboanga del Sur, 3rd District':          'Zamboanga del Sur, 2nd District',
  // True splits: null means handled by DISTRICT_SPLITS
  'San Juan-Mandaluyong, Lone District':      null,
  'Las Piñas-Muntinlupa City, Lone District': null,
  'Kalinga-Apayao, Lone District':            null,
};

// Old combined district → BOTH successors get the history
const DISTRICT_SPLITS = {
  'San Juan-Mandaluyong, Lone District':      ['San Juan City, Lone District', 'Mandaluyong City, Lone District'],
  'Las Piñas-Muntinlupa City, Lone District': ['Las Piñas City, Lone District', 'Muntinlupa City, Lone District'],
  'Kalinga-Apayao, Lone District':            ['Kalinga, Lone District', 'Apayao, Lone District'],
};

function mergeDistricts(rawRows) {
  // rawRows: [{r, d, h:{congress: name}}]
  const merged = {}; // canonical_name → {r, d, h}

  function ensure(r, d) {
    if (!merged[d]) merged[d] = { r, d, h: {} };
  }
  function absorb(target, sourceH) {
    for (const [c, v] of Object.entries(sourceH)) {
      if (v && !merged[target].h[c]) merged[target].h[c] = v;
    }
  }

  for (const row of rawRows) {
    const dn = row.d;
    if (dn in DISTRICT_SPLITS) {
      // Distribute to both successors
      const succs = DISTRICT_SPLITS[dn];
      for (const s of succs) {
        ensure(row.r, s);
        absorb(s, row.h);
      }
    } else {
      const canon = (dn in DISTRICT_CANON) ? DISTRICT_CANON[dn] : dn;
      if (!canon) continue; // null = handled as split above
      ensure(row.r, canon);
      absorb(canon, row.h);
    }
  }

  return Object.values(merged).sort((a, b) =>
    a.r < b.r ? -1 : a.r > b.r ? 1 : a.d < b.d ? -1 : 1
  );
}

// ─── FUZZY NAME MATCHING ──────────────────────────────────────────────────
function normName(s) {
  if (!s) return '';
  return s.toLowerCase()
    .replace(/["""'']/g, '')
    .replace(/\b(jr|sr|ii|iii|iv|v|md|phd)\.?\b/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}
function surName(s) {
  const n = normName(s);
  return n.includes(',') ? n.split(',')[0].trim() : n.split(' ')[0];
}
function firstName(s) {
  const n = normName(s);
  if (n.includes(',')) return (n.split(',').slice(1).join(',').trim()).split(' ')[0];
  return n.split(' ')[1] || '';
}
function lev(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const dp = Array.from({length:a.length+1}, (_,i) =>
    Array.from({length:b.length+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=a.length;i++)
    for (let j=1;j<=b.length;j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}
function fuzzyScore(a, b) {
  if (!a || !b) return 0;
  const na = normName(a), nb = normName(b);
  if (na === nb) return 1.0;
  const sa = surName(a), sb = surName(b);
  const sdist = lev(sa, sb);
  if (Math.max(sa.length, sb.length) > 3 && sdist > 2) return 0;
  const fa = firstName(a), fb = firstName(b);
  const fnSim = 1 - lev(fa,fb) / (Math.max(fa.length,fb.length)||1);
  const sSim  = 1 - sdist / (Math.max(sa.length,sb.length)||1);
  const full  = 1 - lev(na,nb) / (Math.max(na.length,nb.length)||1);
  return sSim*0.5 + fnSim*0.3 + full*0.2;
}
const FUZZY_THRESHOLD = 0.75;

function splitRepNames(val) {
  if (!val) return [];
  return val.split(/[;\n]/).map(s => s.trim()).filter(Boolean);
}

// ─── DATA STORE ──────────────────────────────────────────────────────────
const DB = { p: [], d: [] };
const ALL_CONGRESSES = ['8th Congress','9th Congress','10th Congress','11th Congress',
  '12th Congress','13th Congress','14th Congress','15th Congress','16th Congress',
  '17th Congress','18th Congress','19th Congress','20th Congress'];
const MODERN_SET = new Set(ALL_CONGRESSES);
let ALL_REGIONS = [];
const PAGE_SIZE = 24;
let searchResults = [], currentPage = 1, cardMode = 'cards';
let debounceTimer = null, currentView = 'search';

// ─── FETCH ────────────────────────────────────────────────────────────────
async function fetchCSV(url) {
  try {
    const r = await fetch(url, {mode:'cors'});
    if (r.ok) { const t = await r.text(); if (t.trim().length > 50) return t; }
  } catch(e) {}
  for (const pFn of CORS_PROXIES) {
    try {
      const r = await fetch(pFn(url));
      if (r.ok) { const t = await r.text(); if (t.trim().length > 50) return t; }
    } catch(e) {}
  }
  throw new Error('All fetch attempts failed');
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')) {
    if (!line.trim()) continue;
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if (c===','&&!inQ) { cols.push(cur.trim()); cur=''; }
      else cur += c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function normCongress(raw) {
  if (!raw) return '';
  const m = raw.trim().match(/^(\d+)(?:st|nd|rd|th)?\s+congress$/i);
  if (!m) return raw.trim();
  const n = parseInt(m[1]);
  const sfx = [11,12,13].includes(n) ? 'th' : ['','st','nd','rd'][n%10]||'th';
  return `${n}${sfx} Congress`;
}

// ─── LOAD LEGISLATORS ────────────────────────────────────────────────────
async function loadLegislators() {
  try {
    const rows = parseCSV(await fetchCSV(LEGISLATORS_CSV_URL));
    let hi = rows.findIndex(r => r.some(c => c.trim().toUpperCase() === 'FULLNAME'));
    if (hi < 0) hi = 3;
    const hdr = rows[hi].map(h =>
      h.trim().toUpperCase().replace(/[^A-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')
    );
    const col = k => hdr.indexOf(k);
    const [iNAME,iNAME2,iREG,iDIST,iPER,iAKA,iFN,iSEX,iBD,iCLAN,iSPK,iLEAD] =
      ['NAME','NAME2','REGION_PROVINCE','DISTRICT','PERIOD','AKA','FULLNAME',
       'SEX','BIRTHDATE','CLAN','HOUSE_SPEAKER_START','HOUSE_LEADERSHIP'].map(col);

    const map = new Map();
    for (const r of rows.slice(hi+1)) {
      const fn = (r[iFN]||'').trim(); if (!fn) continue;
      if (!map.has(fn)) map.set(fn,{fn,n2:'',n:'',ak:'',rg:'',di:'',sx:'',bd:'',cl:null,sp:false,ld:'',tr:[],tt:0,cm:0});
      const p = map.get(fn);
      const rn=(r[iNAME]||'').trim(), r2=(r[iNAME2]||'').trim();
      if (rn&&!rn.startsWith('=')&&!p.n2) p.n2=rn;
      if (r2&&!r2.startsWith('=')&&!p.n)  p.n=r2;
      if (!p.rg&&r[iREG])  p.rg=r[iREG].trim();
      if (!p.di&&r[iDIST]) p.di=r[iDIST].trim();
      if (!p.sx&&r[iSEX])  p.sx=r[iSEX].trim();
      if (!p.bd&&r[iBD])   p.bd=r[iBD].trim();
      if (!p.cl&&iCLAN>=0&&r[iCLAN]) p.cl=r[iCLAN].trim();
      if (!p.ld&&iLEAD>=0&&r[iLEAD]) p.ld=r[iLEAD].trim();
      if (!p.ak&&iAKA>=0&&r[iAKA])   p.ak=r[iAKA].trim();
      if (!p.sp&&iSPK>=0&&r[iSPK])   p.sp=true;
      const period=(r[iPER]||'').trim();
      if (period){p.tt++;const nc=normCongress(period);if(MODERN_SET.has(nc))p.tr.push(nc);}
    }
    DB.p = [...map.values()].map(p=>({
      ...p, dy:Boolean(p.cl),
      n2:p.n2||p.fn, n:p.n||p.n2||p.fn,
      sx:(p.sx||'').toLowerCase().startsWith('f')?'F':'M'
    }));
    console.log(`✅ Legislators: ${DB.p.length}, dynasty: ${DB.p.filter(x=>x.dy).length}`);
  } catch(e) {
    console.error('loadLegislators failed:', e);
  }
}

// ─── LOAD DISTRICTS (with merge) ─────────────────────────────────────────
async function loadDistricts() {
  try {
    const rows = parseCSV(await fetchCSV(DISTRICTS_CSV_URL));
    if (rows.length < 2) return;
    const congCols = rows[0].slice(2).map(h => normCongress(h||''));
    const rawRows = rows.slice(1)
      .filter(r => (r[0]||'').trim() && (r[1]||'').trim())
      .map(r => {
        const h = {};
        congCols.forEach((c,i) => { if(c && r[2+i] && r[2+i].trim()) h[c]=r[2+i].trim(); });
        return { r:r[0].trim(), d:r[1].trim(), h };
      });
    DB.d = mergeDistricts(rawRows).map(d => ({...d, matched:{}}));
    console.log(`✅ Districts: ${DB.d.length} canonical (merged from ${rawRows.length} raw rows)`);
  } catch(e) {
    console.error('loadDistricts failed:', e);
  }
}

// ─── FUZZY PERSON LOOKUP ─────────────────────────────────────────────────
function findPerson(name) {
  if (!name || !name.trim()) return null;
  const clean = name.trim();
  // Exact match first
  let hit = DB.p.find(p => p.fn===clean||p.n2===clean||p.n===clean);
  if (hit) return hit;
  // Case-insensitive
  const lc = clean.toLowerCase();
  hit = DB.p.find(p => (p.fn||'').toLowerCase()===lc||(p.n2||'').toLowerCase()===lc);
  if (hit) return hit;
  // Fuzzy: only check names starting with same first letter
  const tSur = surName(clean);
  if (!tSur) return null;
  let best = null, bestScore = FUZZY_THRESHOLD;
  for (const p of DB.p) {
    if (!surName(p.fn).startsWith(tSur[0])) continue;
    const score = Math.max(fuzzyScore(clean,p.fn), fuzzyScore(clean,p.n2), fuzzyScore(clean,p.n));
    if (score > bestScore) { bestScore=score; best=p; }
  }
  return best;
}

// ─── INIT ────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('kpiRow').innerHTML =
    `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text3)">
      <div style="font-size:28px;margin-bottom:12px">⏳</div>
      <div style="font-size:15px;font-weight:500">Loading live data from both sources…</div>
      <div style="font-size:12px;margin-top:6px;opacity:.6">Fetching legislators + districts, then cross-linking with fuzzy matching</div>
    </div>`;

  await Promise.all([loadLegislators(), loadDistricts()]);

  // ── CROSS-LINK: enrich district reps with roster data ──
  // For every rep name in the districts sheet, fuzzy-match against
  // the roster and attach their clan/dynasty info directly.
  // This is the bridge between the two data sources.
  let enriched = 0;
  for (const d of DB.d) {
    for (const congress of ALL_CONGRESSES) {
      const cell = d.h[congress] || '';
      if (!cell) continue;
      const names = splitRepNames(cell);
      for (const rawName of names) {
        const match = findPerson(rawName);
        if (match) {
          if (!d.matched[congress]) d.matched[congress] = [];
          d.matched[congress].push(match);
          if (match.cl) enriched++;
          // Also back-fill: if roster has no district, pull from districts sheet
          if (!match.di) match.di = d.d;
          if (!match.rg) match.rg = d.r;
          // If roster doesn't have this congress term, add it
          if (!match.tr.includes(congress)) {
            match.tr.push(congress);
            match.tt++;
          }
        }
      }
    }
  }
  console.log(`✅ Cross-linked ${enriched} dynasty matches between districts + roster`);

  // Sort congress terms chronologically
  DB.p.forEach(p => {
    p.tr = [...new Set(p.tr)].sort((a,b) => {
      const na = parseInt(a), nb = parseInt(b);
      return na - nb;
    });
  });

  // Clan member counts
  const clanCounts = {};
  DB.p.forEach(p => { if(p.cl) clanCounts[p.cl]=(clanCounts[p.cl]||0)+1; });
  DB.p.forEach(p => { if(p.cl) p.cm=clanCounts[p.cl]; });

  // Regions from both sources
  ALL_REGIONS = [...new Set([
    ...DB.p.map(p=>p.rg), ...DB.d.map(d=>d.r)
  ].filter(Boolean))].sort();

  buildKPIs();
  populateSelects();
  doSearch();
  renderDistrictHeader();
}

// ─── KPIs ─────────────────────────────────────────────────────────────────
function buildKPIs() {
  const p = DB.p, total = p.length;
  const dyM = p.filter(x=>x.dy).length;
  const dyPct = total ? (dyM/total*100).toFixed(1) : 0;
  const famC = {};
  p.filter(x=>x.dy&&x.cl).forEach(x=>{famC[x.cl]=(famC[x.cl]||0)+1;});
  const numFam = Object.keys(famC).length;
  const majFam = Object.values(famC).filter(c=>c>=3).length;
  const biggest = Object.entries(famC).sort((a,b)=>b[1]-a[1])[0];
  const femDy = p.filter(x=>x.dy&&x.sx==='F').length;
  const femPct = dyM ? (femDy/dyM*100).toFixed(0) : 0;
  const spkrs = p.filter(x=>x.dy&&x.sp).length;

  document.getElementById('kpiRow').innerHTML = [
    {label:'Dynasty Members',            val:dyM,      sub:`out of ${total} total legislators`,   icon:'👑',accent:'var(--gold)',      trend:`${dyPct}% of all legislators`},
    {label:'% Dynasty-Held Seats',       val:dyPct+'%',sub:'of all legislative seats',            icon:'📊',accent:'var(--red)',       trend:'Across all congresses tracked'},
    {label:'Political Dynasty Families', val:numFam,   sub:'unique political clans',              icon:'🏰',accent:'var(--purple)',    trend:`${majFam} with 3+ members`},
    {label:'Largest Dynasty',            val:biggest?biggest[1]:'—',sub:biggest?biggest[0]:'—',   icon:'⚜️',accent:'var(--gold-light)',trend:'Members across all congresses'},
    {label:'Women in Dynasties',         val:femDy,    sub:`${femPct}% of dynasty members`,       icon:'♀', accent:'#C97EE0',          trend:`${spkrs} Speaker(s) from dynasties`},
  ].map(k=>`
    <div class="kpi-card" style="--accent-bar:${k.accent}">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
      <div class="kpi-trend neutral">${k.trend}</div>
    </div>`).join('');
}

// ─── SELECTS ──────────────────────────────────────────────────────────────
function populateSelects() {
  ['congressSelect','dCongressSelect','cCongressSelect'].forEach(id=>{
    const s=document.getElementById(id); if(!s) return;
    const d=s.options[0].outerHTML;
    s.innerHTML=d+ALL_CONGRESSES.slice().reverse().map(c=>`<option value="${c}">${c}</option>`).join('');
  });
  ['dRegionSelect','cRegionSelect'].forEach(id=>{
    const s=document.getElementById(id); if(!s) return;
    const d=s.options[0].outerHTML;
    s.innerHTML=d+ALL_REGIONS.map(r=>`<option value="${r}">${r}</option>`).join('');
  });
}

// ─── SEARCH ───────────────────────────────────────────────────────────────
function debounceSearch(){clearTimeout(debounceTimer);debounceTimer=setTimeout(doSearch,250);}

function doSearch(){
  const q   =(document.getElementById('nameInput').value||'').toLowerCase().trim();
  const dq  =(document.getElementById('districtInput').value||'').toLowerCase().trim();
  const cong=document.getElementById('congressSelect').value;
  const filt=document.getElementById('filterSelect').value;
  searchResults=DB.p.filter(p=>{
    if(q && !([p.fn,p.n2,p.n,p.ak].map(s=>(s||'').toLowerCase()).join(' ')).includes(q)) return false;
    if(dq && ![(p.di||''),(p.rg||'')].map(s=>s.toLowerCase()).join(' ').includes(dq)) return false;
    if(cong && !(p.tr||[]).includes(cong)) return false;
    if(filt==='dynasty'   && !p.dy)        return false;
    if(filt==='female'    && p.sx!=='F')   return false;
    if(filt==='male'      && p.sx!=='M')   return false;
    if(filt==='multiterm' && p.tt<3)       return false;
    return true;
  });
  currentPage=1; renderResults();
}

function clearSearch(){
  ['nameInput','districtInput'].forEach(id=>document.getElementById(id).value='');
  ['congressSelect','filterSelect'].forEach(id=>document.getElementById(id).value='');
  doSearch();
}

// ─── RENDER RESULTS ───────────────────────────────────────────────────────
function renderResults(){
  const total=searchResults.length;
  const start=(currentPage-1)*PAGE_SIZE;
  const page=searchResults.slice(start,start+PAGE_SIZE);
  document.getElementById('resultsCount').innerHTML=
    `Showing <span>${Math.min(start+PAGE_SIZE,total).toLocaleString()}</span> of <span>${total.toLocaleString()}</span> legislators`;
  cardMode==='cards' ? renderCards(page) : renderTable(page);
  renderPagination(total);
}

function renderCards(items){
  document.getElementById('cardsView').style.display='';
  document.getElementById('tableView').style.display='none';
  if(!items.length){document.getElementById('cardsView').innerHTML=emptyState('🔍','No legislators found.');return;}
  document.getElementById('cardsView').innerHTML=`<div class="person-grid fade-in">${items.map(personCard).join('')}</div>`;
}

function personCard(p){
  const tags=[];
  if(p.rg)     tags.push(`<span class="tag tag-region">${p.rg}</span>`);
  if(p.dy)     tags.push(`<span class="tag tag-dynasty">👑 Dynasty</span>`);
  if(p.sx==='F') tags.push(`<span class="tag tag-female">♀ Female</span>`);
  if(p.sp)     tags.push(`<span class="tag tag-speaker">🏛 Speaker</span>`);
  const sorted = (p.tr||[]).slice().sort((a,b)=>parseInt(a)-parseInt(b));
  const first = sorted[0]||'—';
  const last  = sorted[sorted.length-1]||'—';
  return `<div class="person-card ${p.dy?'dynasty':''}" onclick="openModal('${encodeURIComponent(p.fn)}')">
    <div class="pc-name">${p.fn||p.n2||'Unknown'}</div>
    <div class="pc-name2">${p.n2||''}</div>
    <div class="pc-tags">${tags.join('')}</div>
    ${p.cl?`<div style="font-size:12px;color:var(--gold-dim);margin-bottom:8px">🏰 ${p.cl}</div>`:''}
    <div class="pc-stats">
      <div class="pc-stat"><div class="pc-stat-val">${p.tt||0}</div><div class="pc-stat-lbl">Terms</div></div>
      <div class="pc-stat" style="text-align:left;flex:1;padding-left:16px">
        <div style="font-size:11px;color:var(--text3)">First: ${first}</div>
        <div style="font-size:11px;color:var(--text3)">Last: ${last}</div>
      </div>
    </div>
  </div>`;
}

function renderTable(items){
  document.getElementById('cardsView').style.display='none';
  document.getElementById('tableView').style.display='';
  if(!items.length){document.getElementById('tableView').innerHTML=emptyState('🔍','No results found.');return;}
  document.getElementById('tableView').innerHTML=`
    <div class="district-table-wrap"><table>
      <thead><tr>
        <th>Full Name</th><th>Sort Name</th><th>Region</th><th>District</th>
        <th>Clan / Dynasty</th><th>Terms</th><th>Sex</th><th>Last Congress</th>
      </tr></thead>
      <tbody>${items.map(p=>`
        <tr onclick="openModal('${encodeURIComponent(p.fn)}')">
          <td>${p.fn||p.n2}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px">${p.n2||''}</td>
          <td>${p.rg||'—'}</td><td>${p.di||'—'}</td>
          <td class="${p.dy?'dynasty-cell':''}">${p.cl||'—'}</td>
          <td style="text-align:center">${p.tt||0}</td>
          <td>${p.sx==='F'?'Female':p.sx==='M'?'Male':'—'}</td>
          <td>${(p.tr&&p.tr.length)?p.tr[p.tr.length-1]:'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

function renderPagination(total){
  const pages=Math.ceil(total/PAGE_SIZE);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let b=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  pageRange(currentPage,pages).forEach(p=>{
    b+=p==='…'
      ?`<span style="padding:6px 4px;color:var(--text3)">…</span>`
      :`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  b+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML=b;
}
function pageRange(cur,total){
  if(total<=7) return Array.from({length:total},(_,i)=>i+1);
  if(cur<=4)   return [1,2,3,4,5,'…',total];
  if(cur>=total-3) return [1,'…',total-4,total-3,total-2,total-1,total];
  return [1,'…',cur-1,cur,cur+1,'…',total];
}
function goPage(p){
  const pages=Math.ceil(searchResults.length/PAGE_SIZE);
  if(p<1||p>pages) return;
  currentPage=p; renderResults();
  window.scrollTo({top:180,behavior:'smooth'});
}
function setCardView(mode,btn){
  cardMode=mode;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); renderResults();
}
function emptyState(icon,text){
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function openModal(encodedName){
  const name=decodeURIComponent(encodedName);
  const p = DB.p.find(x=>x.fn===name||x.n2===name||x.n===name) || findPerson(name);
  if(!p) return;

  document.getElementById('modalName').textContent=p.fn||p.n2;
  document.getElementById('modalName2').textContent=p.n2+(p.ak?' · AKA: '+p.ak:'');

  const sorted = (p.tr||[]).slice().sort((a,b)=>parseInt(a)-parseInt(b));

  // Find which districts this person represented (from districts sheet cross-link)
  const repDistricts = DB.d.filter(d =>
    Object.values(d.matched||{}).some(arr => arr.some(m => m.fn===p.fn))
  );
  const districtStr = repDistricts.length
    ? repDistricts.map(d=>d.d).join(', ')
    : p.di || '—';

  const info=[
    {lbl:'Sex',              val:p.sx==='F'?'Female':p.sx==='M'?'Male':'Unknown'},
    {lbl:'Birthdate',        val:p.bd||'—'},
    {lbl:'Region/Province',  val:p.rg||'—'},
    {lbl:'District(s)',      val:districtStr},
    {lbl:'Dynasty / Clan',   val:p.cl||'None', cls:p.dy?'dynasty':''},
    {lbl:'Clan Members',     val:p.cm>=2?p.cm+' members in Congress':'—'},
    {lbl:'Total Terms',      val:p.tt||0},
    {lbl:'House Leadership', val:p.ld||'—'},
  ];
  let html=`<div class="info-grid">${info.map(i=>`
    <div class="info-item"><div class="info-lbl">${i.lbl}</div>
    <div class="info-val ${i.cls||''}">${i.val}</div></div>`).join('')}</div>`;

  if(sorted.length){
    html+=`<div class="section-head">📅 Congress Timeline</div>
    <div class="timeline">${sorted.map(per=>`
      <div class="tl-item"><div class="tl-dot"></div>
      <div class="tl-period">${per}</div></div>`).join('')}</div>`;
  }

  if(p.cl&&p.dy){
    const mates=DB.p.filter(x=>x.cl===p.cl&&x.fn!==p.fn).slice(0,10);
    if(mates.length){
      html+=`<div class="section-divider"></div>
      <div class="section-head">👑 Dynasty Members — ${p.cl}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${mates.map(m=>`
          <div onclick="openModal('${encodeURIComponent(m.fn)}')"
            style="display:flex;justify-content:space-between;align-items:center;
            padding:10px 14px;background:var(--dynasty-bg);border:1px solid var(--dynasty-border);
            border-radius:8px;cursor:pointer">
            <div>
              <div style="font-size:14px;color:var(--text)">${m.fn||m.n2}</div>
              <div style="font-size:12px;color:var(--text3)">${m.rg||''} · ${m.tt} terms</div>
            </div>
            <span style="font-size:18px">›</span>
          </div>`).join('')}
      </div>`;
    }
  }

  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ─── DISTRICTS VIEW ───────────────────────────────────────────────────────
function renderDistrictHeader(){
  document.getElementById('districtThead').innerHTML=`<tr>
    <th style="min-width:200px">Region</th>
    <th style="min-width:220px">District</th>
    ${ALL_CONGRESSES.slice().reverse().map(c=>`<th style="min-width:120px">${c}</th>`).join('')}
  </tr>`;
}

function renderDistricts(){
  const q   =(document.getElementById('dSearchInput').value||'').toLowerCase();
  const reg =document.getElementById('dRegionSelect').value;
  const cong=document.getElementById('dCongressSelect').value;
  const displayCongs = ALL_CONGRESSES.slice().reverse();

  let rows='', curReg='';
  DB.d.filter(d=>{
    if(reg && d.r!==reg) return false;
    if(q && !(d.r+'|'+d.d).toLowerCase().includes(q)) return false;
    if(cong && !d.h[cong]) return false;
    return true;
  }).forEach(d=>{
    if(d.r!==curReg){
      curReg=d.r;
      rows+=`<tr class="region-row"><td colspan="${2+displayCongs.length}">${d.r}</td></tr>`;
    }
    rows+=`<tr><td>${d.r}</td><td style="font-weight:500">${d.d}</td>
      ${displayCongs.map(c=>{
        const raw = d.h[c]||'';
        const matchedPersons = (d.matched&&d.matched[c])||[];
        const isDyn = matchedPersons.some(m=>m.dy) ||
          splitRepNames(raw).some(name => {
            const mp = findPerson(name);
            return mp && mp.dy;
          });
        const display = raw || '—';
        const firstRaw = splitRepNames(raw)[0]||'';
        const clickEnc = firstRaw ? encodeURIComponent(firstRaw) : '';
        return `<td title="${raw}"
          style="${isDyn?'color:var(--gold);font-weight:600':''};${raw?'cursor:pointer':''}"
          ${clickEnc?`onclick="openModal('${clickEnc}')"`:''}>${display}</td>`;
      }).join('')}</tr>`;
  });

  document.getElementById('districtTbody').innerHTML = rows ||
    `<tr><td colspan="${2+ALL_CONGRESSES.length+2}" style="text-align:center;padding:40px;color:var(--text3)">No districts match.</td></tr>`;
}

// ─── DYNASTIES VIEW ───────────────────────────────────────────────────────
function renderDynasties(){
  const q  =(document.getElementById('clanSearchInput').value||'').toLowerCase();
  const min=parseInt(document.getElementById('clanMinSelect').value)||2;
  const clanMap={};
  DB.p.forEach(p=>{
    if(!p.cl||!p.dy) return;
    if(!clanMap[p.cl]) clanMap[p.cl]={name:p.cl,members:[],count:0};
    clanMap[p.cl].members.push(p); clanMap[p.cl].count++;
  });
  let clans=Object.values(clanMap).filter(c=>c.count>=min);
  if(q) clans=clans.filter(c=>c.name.toLowerCase().includes(q));
  clans.sort((a,b)=>b.count-a.count);
  if(!clans.length){document.getElementById('dynastyContent').innerHTML=emptyState('👑','No dynasties found.');return;}
  document.getElementById('dynastyContent').innerHTML=clans.map(c=>{
    const ms=c.members.slice(0,8).map(m=>`
      <div onclick="openModal('${encodeURIComponent(m.fn)}')"
        style="display:flex;justify-content:space-between;align-items:center;
        padding:8px 12px;background:var(--navy2);border-radius:6px;cursor:pointer;transition:background .15s"
        onmouseover="this.style.background='var(--surface3)'"
        onmouseout="this.style.background='var(--navy2)'">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text)">${m.fn||m.n2}</div>
          <div style="font-size:11px;color:var(--text3)">${m.rg||''} · ${m.tt} term${m.tt!==1?'s':''}</div>
        </div>
        <span style="color:var(--text3)">›</span>
      </div>`).join('');
    const extra=c.count>8?`<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px">+${c.count-8} more members</div>`:'';
    return `
      <div style="background:var(--dynasty-bg);border:1px solid var(--dynasty-border);border-radius:12px;padding:20px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-light)">${c.name}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:2px">${c.count} members across all congresses</div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:36px;color:var(--gold);opacity:.6">${c.count}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">${ms}${extra}</div>
      </div>`;
  }).join('');
}

// ─── CONGRESS VIEW ────────────────────────────────────────────────────────
function renderCongressView(){
  const cong=document.getElementById('cCongressSelect').value;
  const reg =document.getElementById('cRegionSelect').value;
  const sex =document.getElementById('cSexSelect').value;
  if(!cong){document.getElementById('congressContent').innerHTML=emptyState('📜','Select a Congress period above.');return;}

  // Pull members from BOTH sources:
  // 1. Roster: anyone with this congress in their tr[]
  // 2. Districts: anyone who appears in this congress column, even if not in roster
  const rosterSet = new Set();
  const members = DB.p.filter(p=>{
    if(!(p.tr||[]).includes(cong)) return false;
    if(reg&&p.rg!==reg) return false;
    if(sex&&p.sx!==sex) return false;
    rosterSet.add(p.fn);
    return true;
  });

  // Add district-only reps (in districts sheet for this congress but not in roster)
  for (const d of DB.d) {
    if(reg && d.r!==reg) continue;
    const cell = d.h[cong];
    if(!cell) continue;
    const names = splitRepNames(cell);
    for (const rawName of names) {
      const matched = findPerson(rawName);
      if(matched && !rosterSet.has(matched.fn)){
        if(sex && matched.sx!==sex) continue;
        members.push(matched);
        rosterSet.add(matched.fn);
      }
    }
  }

  const dynC=members.filter(p=>p.dy).length;
  const femC=members.filter(p=>p.sx==='F').length;
  const dynF=[...new Set(members.filter(p=>p.dy&&p.cl).map(p=>p.cl))].length;
  const tot=members.length||1;
  document.getElementById('congressContent').innerHTML=`
    <div class="kpi-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
      <div class="kpi-card" style="--accent-bar:var(--blue)"><div class="kpi-label">Members</div><div class="kpi-value">${members.length}</div><div class="kpi-sub">in ${cong}</div></div>
      <div class="kpi-card" style="--accent-bar:var(--gold)"><div class="kpi-label">Dynasty Members</div><div class="kpi-value">${dynC}</div><div class="kpi-sub">${(dynC/tot*100).toFixed(1)}%</div></div>
      <div class="kpi-card" style="--accent-bar:var(--purple)"><div class="kpi-label">Dynasty Families</div><div class="kpi-value">${dynF}</div><div class="kpi-sub">unique clans</div></div>
      <div class="kpi-card" style="--accent-bar:#C97EE0"><div class="kpi-label">Female Legislators</div><div class="kpi-value">${femC}</div><div class="kpi-sub">${(femC/tot*100).toFixed(1)}%</div></div>
      <div class="kpi-card" style="--accent-bar:var(--green)"><div class="kpi-label">Regions</div><div class="kpi-value">${[...new Set(members.map(p=>p.rg).filter(Boolean))].length}</div><div class="kpi-sub">represented</div></div>
    </div>
    <div class="person-grid fade-in">${members.map(personCard).join('')}</div>`;
}

// ─── NAV ──────────────────────────────────────────────────────────────────
function showView(view){
  currentView=view;
  ['search','districts','dynasties','congress'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===view?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['search','districts','dynasties','congress'][i]===view);
  });
  if(view==='dynasties') renderDynasties();
  if(view==='districts') renderDistricts();
  if(view==='congress')  renderCongressView();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
window.addEventListener('load', init);
</script>
